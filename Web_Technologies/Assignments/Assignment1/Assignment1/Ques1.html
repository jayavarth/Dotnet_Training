<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>HTML Practice</title>
</head>
<body>
    <!-- 1.Largest heading -->
    <h1>Welcome</h1>
    <!-- 2.Second highest heading -->
    <h2>About Us</h2>
    <!-- 3.Third highest heading centered -->
    <h3 align="center">Welcome To HTML</h3>
    <!-- 4.Heading with color -->
    <h2 style="color:#0066cc;">Services</h2>
    <!-- 5.Underlined red heading -->
    <h2 style="color:#ff0000;">
        <u>Important</u>
    </h2>
    <!-- 6.Text input field -->
    <label>Name:</label>
    <input type="text" />
    <br />
    <br />
    <!-- 7.Password input field -->
    <label>Password:</label>
    <input type="password" placeholder="Enter your password" />
    <br/>
    <br/>
    <!-- 8.Checkbox with label -->
    <input type="checkbox" id="agree" />
    <label for="agree">I Agree</label>
    <br/>
    <!-- 9.Audio file -->
    <audio controls>
        <source src="sample-6s.mp3" type="audio/mpeg" />
        Your browser does not support the audio element.
    </audio>
    <!-- 10.Unordered list -->
    <ul>
        <li>Red</li>
        <li>Blue</li>
    </ul>
</body>
</html>
